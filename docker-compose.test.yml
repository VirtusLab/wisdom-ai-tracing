services:
  test-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tracevault_test
      POSTGRES_USER: tracevault_test
      POSTGRES_PASSWORD: tracevault_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracevault_test"]
      interval: 2s
      timeout: 2s
      retries: 10
