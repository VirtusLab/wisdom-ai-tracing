name: Release-plz

permissions:
  pull-requests: write
  contents: write
  actions: write

on:
  push:
    branches:
      - main
  # Backup trigger: GitHub's push event sometimes does not fire after a
  # rebase/squash merge, leaving release-plz stuck. Catch the merge via
  # pull_request_target so the workflow still runs.
  pull_request_target:
    types: [closed]
    branches:
      - main
  # Final safety net — runs hourly so a missed push/merge never blocks a
  # release for more than an hour.
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  release-plz-release:
    name: Release-plz release
    # Skip when triggered by a PR close that wasn't actually merged.
    if: >-
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main
      - name: Create enterprise stub (submodule not available in OSS CI)
        run: |
          if [ ! -f enterprise/Cargo.toml ]; then
            mkdir -p enterprise/src
            cat > enterprise/Cargo.toml << 'STUB'
          [package]
          name = "tracevault-enterprise"
          version = "0.1.0"
          edition = "2021"
          publish = false

          [dependencies]
          tracevault-core = { path = "../crates/tracevault-core" }
          async-trait = "0.1"
          STUB
            echo "" > enterprise/src/lib.rs
          fi
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Trigger binary builds and Homebrew update
        if: steps.release-plz.outputs.releases_created == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(echo '${{ steps.release-plz.outputs.releases }}' | jq -r '.[0].tag')
          echo "Release created for tag: $tag"
          gh workflow run release-binaries.yml \
            --repo ${{ github.repository }} \
            --field tag=$tag

  release-plz-pr:
    name: Release-plz PR
    # Skip when triggered by a PR close that wasn't actually merged.
    if: >-
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    concurrency:
      # Keyed on the target branch (main) so all triggers share one slot —
      # otherwise pull_request_target events would create per-PR groups.
      group: release-plz-main
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main
      - name: Create enterprise stub (submodule not available in OSS CI)
        run: |
          if [ ! -f enterprise/Cargo.toml ]; then
            mkdir -p enterprise/src
            cat > enterprise/Cargo.toml << 'STUB'
          [package]
          name = "tracevault-enterprise"
          version = "0.1.0"
          edition = "2021"
          publish = false

          [dependencies]
          tracevault-core = { path = "../crates/tracevault-core" }
          async-trait = "0.1"
          STUB
            echo "" > enterprise/src/lib.rs
          fi
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Run release-plz
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
