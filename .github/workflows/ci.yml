name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tracevault
          POSTGRES_PASSWORD: tracevault
          POSTGRES_DB: tracevault
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Create enterprise stub (submodule not available in OSS CI)
        run: |
          if [ ! -f enterprise/Cargo.toml ]; then
            mkdir -p enterprise/src
            cat > enterprise/Cargo.toml << 'STUB'
          [package]
          name = "tracevault-enterprise"
          version = "0.1.0"
          edition = "2021"
          publish = false

          [dependencies]
          tracevault-core = { path = "../crates/tracevault-core" }
          async-trait = "0.1"
          STUB
            echo "" > enterprise/src/lib.rs
          fi
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cargo build --release
      - name: Test
        run: cargo test
        env:
          DATABASE_URL: postgres://tracevault:tracevault@localhost:5432/tracevault

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - run: pnpm run build
      - run: pnpm test
